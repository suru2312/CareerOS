{% extends 'base.html' %}

{% block content %}

<h2>
    Welcome {{ request.user.username }} 👋
</h2>

<hr>

<div class="row">

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">

                <h5>Applications</h5>

                <h2>
                    {{ applications_count }}
                </h2>

            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">

                <h5>Interviews</h5>

                <h2>
                    {{ interviews_count }}
                </h2>

            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">

                <h5>Goals</h5>

                <h2>
                    {{ goals_count }}
                </h2>

            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card">
            <div class="card-body">

                <h5>Learning</h5>

                <h2>
                    {{ learning_count }}
                </h2>

            </div>
        </div>
    </div>

</div>

{% endblock %}
