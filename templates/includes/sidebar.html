<div class="sidebar">

    <div class="sidebar-logo">

        🚀 CareerOS

    </div>

    <div class="sidebar-section">

        <div class="sidebar-heading">

            CAREER

        </div>

        <div class="sidebar-menu">

            <a href="/"
                class="{% if request.path == '/' %}active{% endif %}">
                🏠 Dashboard
            </a>

            <a href="{% url 'job_list' %}"
                class="{% if '/jobs/' in request.path %}active{% endif %}">
                💼 Jobs
            </a>

            <a href="{% url 'resume_list' %}"
                class="{% if '/resumes/' in request.path %}active{% endif %}">
                📄 Resumes
            </a>

            <a href="{% url 'interview_list' %}"
                class="{% if '/interviews/' in request.path %}active{% endif %}">
                🎤 Interviews
            </a>

        </div>

    </div>

    <div class="sidebar-section">

        <div class="sidebar-heading">

            PRODUCTIVITY

        </div>

        <div class="sidebar-menu">

            <a href="{% url 'goal_list' %}"
                class="{% if '/goals/' in request.path %}active{% endif %}">
                🎯 Goals
            </a>

            <a href="{% url 'learning_list' %}"
                class="{% if '/learning/' in request.path %}active{% endif %}">
                📚 Learning
            </a>

        </div>

    </div>

    <div class="sidebar-section">

        <div class="sidebar-heading">

            ACCOUNT

        </div>

        <div class="sidebar-menu">

            <a href="{% url 'profile_detail' %}"
                class="{% if '/profile/' in request.path %}active{% endif %}">
                👤 Profile
            </a>

        </div>

    </div>

    <div class="sidebar-footer">

        <div class="user-info">

            <small>Logged in as</small>

            <br>

            <strong>
                {{ request.user.username }}
            </strong>

        </div>

        <form
            method="POST"
            action="{% url 'logout' %}">

            {% csrf_token %}

            <button
                class="btn btn-danger"
                type="submit">

                Logout

            </button>

        </form>

    </div>

</div>
