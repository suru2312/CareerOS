    <div class="sidebar-menu">

        <a href="/">
            🏠 Dashboard
        </a>

        <a href="{% url 'job_list' %}">
            💼 Jobs
        </a>

        <a href="{% url 'resume_list' %}">
            📄 Resumes
        </a>

        <a href="{% url 'interview_list' %}">

        <a href="{% url 'goal_list' %}">

        <a href="{% url 'learning_list' %}">

        </a>

        <a href="{% url 'profile_detail' %}">

    </div>

        <div class="user-info">

            Logged in as

            <br>

            </button>

        </form>

    </div>

</div>
