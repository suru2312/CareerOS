{% extends 'base.html' %}

{% block content %}

<h2>Delete Resume</h2>

<div class="alert alert-danger">

    Are you sure you want to delete:

    <strong>
        {{ resume.title }}
    </strong>

    ?

</div>

<form method="POST">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger">

        Yes, Delete

    </button>

    <a
        href="{% url 'resume_list' %}"
        class="btn btn-secondary">

        Cancel

    </a>

</form>

{% endblock %}
