{% extends 'base.html' %}

{% block content %}

<div class="table-page">

    <div class="table-header">

        <h1 class="table-title">
            My Resumes
        </h1>

        <a href="{% url 'resume_create' %}"
           class="btn btn-primary">

            Upload Resume

        </a>

    </div>

    <div class="table-card">

        <table class="custom-table">

            <thead>

                <tr>
                    <th>Title</th>
                    <th>Resume</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody>

                {% for resume in resumes %}

                <tr>

                    <td>{{ resume.title }}</td>

                    <td>

                        <div class="actions">

                            <a href="{{ resume.resume_file.url }}"
                               target="_blank"
                               class="btn btn-success">

                                Open

                            </a>

                            <a href="{{ resume.resume_file.url }}"
                               download
                               class="btn btn-secondary">

                                Download

                            </a>

                        </div>

                    </td>

                    <td>

                        <a href="{% url 'resume_delete' resume.id %}"
                           class="btn btn-danger">

                            Delete

                        </a>

                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="3">

                        <div class="empty-state">

                            No resumes uploaded.

                        </div>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
