{% extends 'base.html' %}

{% block content %}

<h2>My Resumes</h2>

<a
    href="{% url 'resume_create' %}"
    class="btn btn-primary mb-3">

    Upload Resume

</a>

<table class="table">

    <thead>
        <tr>
            <th>Title</th>
            <th>Resume</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>

        {% for resume in resumes %}

        <tr>

            <td>{{ resume.title }}</td>

            <td>

                <a
                    href="{{ resume.resume_file.url }}"
                    target="_blank"
                    class="btn btn-info btn-sm">

                    Open

                </a>

                <a
                    href="{{ resume.resume_file.url }}"
                    download
                    class="btn btn-secondary btn-sm">

                    Download

                </a>

            </td>

            <td>

                <a
                    href="{% url 'resume_delete' resume.id %}"
                    class="btn btn-danger btn-sm">

                    Delete

                </a>

            </td>

        </tr>

        {% empty %}

        <tr>
            <td colspan="3">
                No resumes uploaded.
            </td>
        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
