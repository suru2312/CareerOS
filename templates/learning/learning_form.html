{% extends 'base.html' %}

{% block content %}

<h2>Learning Item</h2>

<div class="form-page">

    <div class="form-card">

        <form method="POST">

            {% csrf_token %}

            {% for field in form %}

                <div class="form-group">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.help_text %}

                        <div class="help-text">

                            {{ field.help_text }}

                        </div>

                    {% endif %}

                    {% for error in field.errors %}

                        <div style="color:red">

                            {{ error }}

                        </div>

                    {% endfor %}

                </div>

            {% endfor %}

            <div class="form-actions">

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save Learning Item

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
